<div class="container" style="margin-top: 70px;">

  <div class="row">

      <div class="col-sm-8 offset-sm-2">

          <div>

              <h2 class="form-title">leave Form</h2>

              <form [formGroup]="leaveForm" (ngSubmit)="applyLeave()">
                  <div class="form-group">

                    <div class="row">
                      <div class="col-md-6">
                        <div class="form-group">
                          <label for="username">First Name:</label>
                          <input type="text" class="form-control" id="username" formControlName="username" readonly  >
                        </div>
                      </div>

                      <div class="col-md-6">
                        <div class="form-group">
                          <label for="lastName">Last Name:</label>
                          <input type="text" class="form-control" id="lastName" formControlName="lastName" readonly  >
                        </div>
                      </div>
                    </div>

                    <label for="date_debut">Start Date</label>
                    <div id="date_debut" class="md-form md-outline input-with-post-icon datepicker" inline="true">
                        <input formControlName="date_debut" placeholder="Select date" type="date" id="date_debut" class="form-control" >
                        <i class="fas fa-calendar input-prefix"></i>
                    </div>

                      <label for="date_fin">End Date</label>
                      <div id="date_fin" class="md-form md-outline input-with-post-icon datepicker" inline="true">
                          <input formControlName="date_fin" placeholder="Select date" type="date" id="date_fin" class="form-control" format="dd/MM/yyyy">
                          <i class="fas fa-calendar input-prefix"></i>
                      </div>

                      <label for="leaveType">Leave Type</label>
                      <div>
                      <select  class="form-control" (change)="modifVisible()" formControlName="leaveType" id="inputGroupSelect01">

                          <option value="Vacation">Vacation</option>
                          <option value="Sick">Sick</option>
                          <option value="Casual Leave">Casual Leave</option>
                          <option value="Paternity Leave">Paternity Leave</option>
                          <option value="Marriage Leave">Marriage Leave</option>
                      </select>
                    </div>
                          <label for="date_fin"*ngIf="visible">File</label>
                          <div *ngIf="visible" id="date_fin" class="md-form md-outline input-with-post-icon datepicker" inline="true">
                              <input  placeholder="Select date" type="file" id="date_fin" (change)="recuperFile($event);" class="form-control">
                              <i class="fas fa-calendar input-prefix"></i>
                          </div>



                  </div>

                  <div class="form-group">
                      <label for="leaveMotive">Leave Motive</label>
                      <textarea formControlName="leaveMotive" name="leaveMotive" class="form-control" id="leaveMotive" aria-describedby="descHelp"></textarea>
                      <small id="descHelp" class="form-text text-muted">Enter your leave Motive</small>
                  </div>




                  <button class="btn btn-primary" type="submit">Apply Leave</button>
              </form>
              <div *ngIf="leaveForm.errors?.['invalidDateRange']">
                <div class="alert alert-danger" role="alert">
                  End date should be later than start date!
                </div>
          </div>

      </div>
  </div>

</div>
