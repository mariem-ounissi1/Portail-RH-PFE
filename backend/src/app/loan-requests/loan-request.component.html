
<div class="container mt-4">
  <h2>Loan Or Advanced Salary Request Form</h2>

  <form [formGroup]="loanForm" (ngSubmit)="submitLoanRequest()">
    <div class="row">
      <div class="col-md-6">
        <div class="form-group">
          <label for="firstName">First Name:</label>
          <input type="text" class="form-control" id="firstName" formControlName="firstName" readonly  >
        </div>
      </div>

      <div class="col-md-6">
        <div class="form-group">
          <label for="lastName">Last Name:</label>
          <input type="text" class="form-control" id="lastName" formControlName="lastName" readonly  >
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="address">Address:</label>
      <input type="text" class="form-control" id="address" formControlName="address" readonly>
    </div>

    <div class="form-group">
      <label for="file1">File</label>
        <div  id="file1" class="md-form md-outline input-with-post-icon datepicker" inline="true">
        <input  placeholder="Select date" type="file" id="file1" (change)="recuperFile($event);" class="form-control">
          <i class="fas fa-calendar input-prefix"></i>
       </div></div>


    <div class="form-group">
      <label for="loanType">Deamand Type:</label>
      <select class="form-control" id="loanType" formControlName="loanType" required>
        <option value="loan">Loan</option>
        <option value="Salary Advance">Salary Advance</option>
      </select>
    </div>

    <div class="form-group">
      <label for="desiredAmount">Desired Amount:</label>
      <input type="number" class="form-control" id="desiredAmount" formControlName="desiredAmount" required>
    </div>



    <button type="submit" class="btn btn-primary">Submit  Request</button>
  </form>

  <hr>


</div>
